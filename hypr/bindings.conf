###################
### KEYBINDINGS ###
###################

source=~/.config/hypr/programs.conf

$mainMod = SUPER

## Bindings
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod ALT, E, exec, $confirm exit
bind = $mainMod ALT, F, exec, $floating
bind = $mainMod, M, exec, $minimize amin
bind = $mainMod ALT, M, exec, $minimize bmin
bind = $mainMod, R, exec, pkill rofi || rofi -show drun
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, N, exec, dunstctl history-pop
bind = $mainMod, G, exec, $gemini
bind = $mainMod ALT, C, exec, google-chrome-stable
bind = $mainMod, F, exec, hyprctl dispatch fullscreen 1
bind = $mainMod, D, exec, killall -SIGUSR1 nwg-dock-hyprland
bind = $mainMod ALT, P, exec, $confirm poweroff
bind = $mainMod ALT, R, exec, $confirm reboot
bind = $mainMod, O, exec, $opaque
bind = $mainMod, V, exec, $clpbrd
bind = $mainMod ALT, V, exec, $clrclpbrd
bind = , PRINT, exec, $scrnsht
bind = $mainMod, C, exec, $ctrlcntr

## Move focus
bind = CTRL, h, movefocus, l
bind = CTRL, j, movefocus, d
bind = CTRL, k, movefocus, u
bind = CTRL, l, movefocus, r

# --- Audio & Brightness Controls (Script with Popups) ---
bindel = ,XF86AudioRaiseVolume, exec, $osd vol_up
bindel = ,XF86AudioLowerVolume, exec, $osd vol_down
bindel = ,XF86AudioMute, exec, $osd vol_mute
bindel = ,XF86AudioMicMute, exec, $osd mic_mute
bindel = ,XF86MonBrightnessUp, exec, $osd br_up
bindel = ,XF86MonBrightnessDown, exec, $osd br_down

## Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

## Switch workspaces with mainMod + [0-9]
# bind = $mainMod, 1, workspace, 1
# bind = $mainMod, 2, workspace, 2
# bind = $mainMod, 3, workspace, 3
# bind = $mainMod, 4, workspace, 4
# bind = $mainMod, 5, workspace, 5
# bind = $mainMod, 6, workspace, 6
# bind = $mainMod, 7, workspace, 7
# bind = $mainMod, 8, workspace, 8
# bind = $mainMod, 9, workspace, 9
# bind = $mainMod, 0, workspace, 10

## Move active window to a workspace with mainMod + SHIFT + [0-9]
