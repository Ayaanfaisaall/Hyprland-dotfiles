[ids]
*

[main]
capslock = backspace
tab = overload(control,tab)
space = overload(symbols,space)
shift = overload(shift,esc)
control = overload(control,capslock)

[control]
h = left
j = down
k = up
l = right

[funcalt]
e = esc

[symbols]
capslock = delete
a = [
s = ]
d = {
f = }
g = ~
G = `
h = \
H = |
j = -
k = =

q = 1
w = 2
e = 3
r = 4
t = 5
y = 6
u = 7
i = 8
o = 9
p = 0

